# AI agent transcript providers supported by membrane ingest.
#
# Default discovery paths (expand ~ in your shell when running ingest):
#   membrane ingest agent ~/.cursor/projects/.../agent-transcripts/ --provider cursor
#   membrane ingest agent ~/.claude/projects/ --provider claude
#   membrane ingest agent ./exports/chat.jsonl --provider auto

providers:
  cursor:
    label: Cursor
    default_paths:
      - ~/.cursor/projects
    notes: Looks for agent-transcripts/**/*.jsonl
  claude:
    label: Claude Code
    default_paths:
      - ~/.claude/projects
    notes: Session JSONL under encoded project folders
  openai:
    label: OpenAI-style chat JSONL
    default_paths: []
    notes: Generic {role, content} or messages[] exports (Continue, Codex, etc.)
